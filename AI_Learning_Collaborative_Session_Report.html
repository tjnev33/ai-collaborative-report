<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Learning Collaborative — Secure Access</title>
<meta name="description" content="AI Learning Collaborative session report. Password required.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1e3a5f;
    --navy-deep: #0f2440;
    --teal: #1a7a6d;
    --gold: #b8942e;
    --white: #ffffff;
    --ink-soft: #5c6272;
    --red: #c44d3a;
    --radius: 16px;
  }

  body {
    font-family: 'Source Sans 3', -apple-system, sans-serif;
    background: var(--navy-deep);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(26,122,109,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(184,148,46,0.06) 0%, transparent 60%),
      radial-gradient(circle at 50% 50%, rgba(30,58,95,1) 0%, rgba(15,36,64,1) 100%);
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  .login-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 460px;
    padding: 20px;
    animation: fadeUp 0.8s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 48px 40px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03) inset;
  }

  .logo-mark {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--teal), #15635a);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(26,122,109,0.25);
  }

  .logo-icon svg { width: 22px; height: 22px; }

  .logo-text {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    color: var(--white);
    line-height: 1.2;
  }

  .logo-text span {
    display: block;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.68rem;
    font-weight: 500;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .login-heading {
    font-family: 'Fraunces', serif;
    font-size: 1.55rem;
    color: var(--white);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .login-subtext {
    font-size: 0.88rem;
    color: var(--ink-soft);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .input-group { position: relative; margin-bottom: 20px; }

  .input-label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .input-field {
    width: 100%;
    padding: 14px 48px 14px 16px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.95rem;
    transition: all 0.25s ease;
    outline: none;
  }

  .input-field::placeholder { color: rgba(255,255,255,0.2); }

  .input-field:focus {
    border-color: var(--teal);
    background: rgba(26,122,109,0.06);
    box-shadow: 0 0 0 3px rgba(26,122,109,0.12);
  }

  .input-field.error {
    border-color: var(--red);
    background: rgba(196,77,58,0.06);
    box-shadow: 0 0 0 3px rgba(196,77,58,0.1);
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .toggle-vis {
    position: absolute;
    right: 14px;
    bottom: 12px;
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.3);
    padding: 4px;
    transition: color 0.2s;
  }

  .toggle-vis:hover { color: rgba(255,255,255,0.6); }

  .error-msg {
    font-size: 0.78rem;
    color: var(--red);
    margin-top: 6px;
    min-height: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .error-msg.visible { opacity: 1; }

  .submit-btn {
    width: 100%;
    padding: 14px 24px;
    background: linear-gradient(135deg, var(--teal), #15635a);
    color: var(--white);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(26,122,109,0.3);
    margin-top: 8px;
  }

  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(26,122,109,0.4); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .footer-note {
    text-align: center;
    margin-top: 24px;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.2);
    line-height: 1.5;
  }

  .district-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }

  .d-dot { width: 8px; height: 8px; border-radius: 50%; opacity: 0.6; }

  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--navy-deep);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .loading-overlay.active { display: flex; }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 0.88rem; color: var(--ink-soft); }

  @media (max-width: 500px) {
    .login-card { padding: 36px 24px; }
    .login-heading { font-size: 1.3rem; }
  }
</style>
</head>

      </div>
    </div>
  </div>
</div>

</div>

const pwd=document.getElementById('pwd');
const err=document.getElementById('errorMsg');

pwd.addEventListener('keydown',function(e){
  if(e.key==='Enter')attemptAccess();
  err.classList.remove('visible');
  pwd.classList.remove('error');
});

function togglePassword(){
  const f=document.getElementById('pwd');
  f.type=f.type==='password'?'text':'password';
}

async function sha256(m){
  const b=new TextEncoder().encode(m);
  const h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

async function attemptAccess(){
  const v=pwd.value;
  if(!v){
    pwd.classList.add('error');
    err.textContent='Please enter a password.';
    err.classList.add('visible');
    return;
  }
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;
  btn.textContent='Verifying\u2026';
  const hash=await sha256(v);
  if(hash===H){
    document.getElementById('loadingOverlay').classList.add('active');
    setTimeout(function(){
      try{
        const bin=atob(R);
        const bytes=new Uint8Array(bin.length);
        for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
        const decoded=new TextDecoder('utf-8').decode(bytes);
        document.open();
        document.write(decoded);
        document.close();
      }catch(e){
        alert('Error loading report. Please refresh and try again.');
      }
    },600);
  }else{
    btn.disabled=false;
    btn.textContent='Access Report';
    pwd.classList.add('error');
    err.textContent='Incorrect password. Please try again.';
    err.classList.add('visible');
    pwd.value='';
    pwd.focus();
  }
}
